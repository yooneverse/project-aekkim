services:
  # ================================
  # 1. 데이터베이스
  # ================================
  mysql-dev:
    image: mysql:8.4
    container_name: e106-mysql-dev
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      TZ: ${TZ}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - e106-dev

  # ================================
  # 2. Redis
  # ================================
  redis-dev:
    image: redis:7-alpine
    container_name: e106-redis-dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e106-dev

  # ================================
  # 3. 백엔드 (Spring Boot)
  # ================================
  backend-dev:
    image: ungnam0509/e106-backend:dev
    container_name: e106-backend-dev
    restart: unless-stopped
    depends_on:
      mysql-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    environment:
      APP_PROFILE: ${APP_PROFILE}
      DB_HOSTNAME: ${DB_HOSTNAME}
      DB_PORT: ${DB_PORT}
      MYSQL_DB: ${MYSQL_DB}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DDL_AUTO: ${DDL_AUTO}
      TZ: ${TZ}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64}
      FINANCE_API_KEY: ${FINANCE_API_KEY}
      FINANCE_INSTITUTION_CODE: ${FINANCE_INSTITUTION_CODE}
      FINANCE_FINTECH_APP_NO: ${FINANCE_FINTECH_APP_NO}
      REDIS_HOSTNAME: ${REDIS_HOSTNAME}
      REDIS_PORT: ${REDIS_PORT}
    ports:
      - "${BACKEND_PORT}:8080"
    networks:
      - e106-dev

  # ================================
  # 4. AI 스크래퍼
  # ================================
  ai-scraper-dev:
    image: ungnam0509/e106-ai-scraper:dev
    container_name: e106-ai-scraper-dev
    restart: unless-stopped
    depends_on:
      mysql-dev:
        condition: service_healthy
    env_file:
      - ../AI/scraper/.env
    environment:
      DB_HOST: mysql-dev
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DB}
      DB_USER: ${DB_USERNAME}
      DB_PASS: ${DB_PASSWORD}
      TZ: ${TZ}
    networks:
      - e106-dev

volumes:
  mysql_dev_data:
  redis_dev_data:

networks:
  e106-dev:

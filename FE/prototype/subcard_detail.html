<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>애낌(AEKKIM) 구독 상세 목업 (토스 스타일)</title>
    <!-- 프리텐다드 폰트 적용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            display: flex;
            justify-content: center;
            gap: 40px;
            background-color: #E5E8EB; 
            padding: 40px;
            margin: 0;
            flex-wrap: wrap;
        }

        /* 스마트폰 디바이스 프레임 */
        .device {
            width: 375px;
            height: 812px;
            border-radius: 36px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        /* ===== 라이트 모드 테마 (Toss) ===== */
        .light {
            background-color: #FFFFFF;
            color: #191F28;
            --bg-color: #FFFFFF;
            --text-main: #191F28;
            --text-sub: #8B95A1;
            --divider: #F2F4F6;
            --toss-blue: #3182F6;
            --btn-cancel-bg: #F2F4F6;
            --btn-cancel-text: #4E5968;
            --promo-bg: #E8F3FF;
            --promo-text: #1B64DA;
            --history-bg: #F2F4F6;
        }

        /* ===== 다크 모드 테마 ===== */
        .dark {
            background-color: #101010;
            color: #F9FAFB;
            --bg-color: #101010;
            --text-main: #F9FAFB;
            --text-sub: #8B95A1;
            --divider: #1C1C1E; /* 다크모드의 구분선/카드 배경 */
            --toss-blue: #3182F6;
            --btn-cancel-bg: #2C2C2E;
            --btn-cancel-text: #D1D6DB;
            --promo-bg: #1A273A;
            --promo-text: #4E95FF;
            --history-bg: #2C2C2E;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* 헤더 영역 */
        .header {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background-color: var(--bg-color);
            z-index: 10;
        }

        .back-btn {
            font-size: 24px;
            color: var(--text-main);
            margin-right: 16px;
            cursor: pointer;
            font-weight: 300;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* 메인 스크롤 콘텐츠 */
        .content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px; /* 하단 고정 버튼 공간 */
        }
        
        .content::-webkit-scrollbar { display: none; }

        /* 서비스 요약 정보 (로고, 금액) */
        .summary-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px 40px;
            text-align: center;
        }

        .logo-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #E50914; /* 넷플릭스 로고 컬러 */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .service-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .service-price {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .next-billing {
            font-size: 14px;
            color: var(--text-sub);
            background-color: var(--divider);
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 500;
        }

        /* 굵은 구분선 (토스 스타일) */
        .thick-divider {
            height: 12px;
            background-color: var(--divider);
            width: 100%;
        }

        /* 섹션 공통 */
        .section {
            padding: 32px 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        /* 체크인 이력 리스트 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-month {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
        }

        .history-response {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            background-color: var(--history-bg);
            padding: 8px 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .empty-history {
            text-align: center;
            padding: 20px 0;
            color: var(--text-sub);
            font-size: 15px;
        }

        /* 프로모션 배너 (조건부) */
        .promo-banner {
            background-color: var(--promo-bg);
            border-radius: 16px;
            padding: 20px;
            margin: 0 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .promo-banner:active {
            opacity: 0.8;
        }

        .promo-content .title {
            color: var(--promo-text);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .promo-content .desc {
            color: var(--text-main);
            font-size: 16px;
            font-weight: 700;
        }

        .promo-icon {
            font-size: 24px;
        }

        /* 하단 고정 CTA 버튼 */
        .bottom-fixed {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 16px 24px 32px;
            box-sizing: border-box;
            background: linear-gradient(to top, var(--bg-color) 80%, transparent);
        }

        .btn-cancel {
            width: 100%;
            height: 56px;
            border-radius: 16px;
            border: none;
            background-color: var(--btn-cancel-bg);
            color: var(--btn-cancel-text);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-cancel:active {
            transform: scale(0.98);
        }

        .device-label {
            position: absolute;
            top: -40px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- 라이트 모드 -->
    <div style="position: relative;">
        <div class="device-label">Light Mode</div>
        <div class="device light">
            
            <div class="header">
                <span class="back-btn">‹</span>
            </div>

            <div class="content">
                <!-- 1. 서비스 요약 정보 -->
                <div class="summary-section">
                    <div class="logo-circle">N</div>
                    <div class="service-name">넷플릭스 (스탠다드)</div>
                    <div class="service-price">13,500원</div>
                    <div class="next-billing">다음 결제일 3월 15일</div>
                </div>

                <!-- 굵은 구분선 -->
                <div class="thick-divider"></div>

                <!-- 2. 체크인 이력 -->
                <div class="section">
                    <div class="section-title">최근 이용 기록</div>
                    <div class="history-list">
                        <div class="history-item">
                            <div class="history-month">2월</div>
                            <div class="history-response">😊 잘 쓰고 있어요</div>
                        </div>
                        <div class="history-item">
                            <div class="history-month">1월</div>
                            <div class="history-response">😅 거의 안 썼어요</div>
                        </div>
                        <div class="history-item">
                            <div class="history-month">12월</div>
                            <div class="history-response">😊 잘 쓰고 있어요</div>
                        </div>
                    </div>
                </div>

                <!-- 3. 조건부 프로모션 배너 -->
                <div class="promo-banner" onclick="alert('프로모션 상세로 이동합니다.')">
                    <div class="promo-content">
                        <div class="title">더 저렴하게 보는 꿀팁</div>
                        <div class="desc">매월 8,600원 절약하는 방법</div>
                    </div>
                    <div class="promo-icon">💡</div>
                </div>
            </div>

            <!-- 하단 고정 해지 버튼 -->
            <div class="bottom-fixed">
                <button class="btn-cancel" onclick="alert('해지 지원 화면으로 이동합니다.')">해지 방법 보기</button>
            </div>

        </div>
    </div>

    <!-- 다크 모드 -->
    <div style="position: relative;">
        <div class="device-label">Dark Mode</div>
        <div class="device dark">
            
            <div class="header">
                <span class="back-btn">‹</span>
            </div>

            <div class="content">
                <!-- 1. 서비스 요약 정보 -->
                <div class="summary-section">
                    <div class="logo-circle">N</div>
                    <div class="service-name">넷플릭스 (스탠다드)</div>
                    <div class="service-price">13,500원</div>
                    <div class="next-billing">다음 결제일 3월 15일</div>
                </div>

                <!-- 굵은 구분선 -->
                <div class="thick-divider"></div>

                <!-- 2. 체크인 이력 -->
                <div class="section">
                    <div class="section-title">최근 이용 기록</div>
                    <div class="history-list">
                        <div class="history-item">
                            <div class="history-month">2월</div>
                            <div class="history-response">😊 잘 쓰고 있어요</div>
                        </div>
                        <div class="history-item">
                            <div class="history-month">1월</div>
                            <div class="history-response">😅 거의 안 썼어요</div>
                        </div>
                        <div class="history-item">
                            <div class="history-month">12월</div>
                            <div class="history-response">😊 잘 쓰고 있어요</div>
                        </div>
                    </div>
                </div>

                <!-- 3. 조건부 프로모션 배너 -->
                <div class="promo-banner" onclick="alert('프로모션 상세로 이동합니다.')">
                    <div class="promo-content">
                        <div class="title">더 저렴하게 보는 꿀팁</div>
                        <div class="desc">매월 8,600원 절약하는 방법</div>
                    </div>
                    <div class="promo-icon">💡</div>
                </div>
            </div>

            <!-- 하단 고정 해지 버튼 -->
            <div class="bottom-fixed">
                <button class="btn-cancel" onclick="alert('해지 지원 화면으로 이동합니다.')">해지 방법 보기</button>
            </div>

        </div>
    </div>

</body>
</html>
